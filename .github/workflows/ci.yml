name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Build Environment
        run: |
          xcodebuild -version
          swift --version

      - name: Verify Xcode 26
        run: |
          XCODE_VERSION=$(xcodebuild -version | awk '/Xcode/ { print $2 }')
          case "$XCODE_VERSION" in
            26.*) ;;
            *) echo "Expected Xcode 26.x, found $XCODE_VERSION"; exit 1 ;;
          esac

      - name: Run Swift Package Tests
        run: swift test

      - name: Build iOS App
        run: |
          xcodebuild build \
            -project Tabata.xcodeproj \
            -target Tabata \
            -configuration Debug \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Watch App
        run: |
          xcodebuild build \
            -project Tabata.xcodeproj \
            -target "Tabata Watch App" \
            -configuration Debug \
            -sdk watchos \
            CODE_SIGNING_ALLOWED=NO
